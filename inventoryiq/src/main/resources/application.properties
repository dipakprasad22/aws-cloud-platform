# InventoryIQ configuration
server.port=8080

# JPA / Hibernate — auto-create/update the schema from the entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Local-dev datasource defaults (used only when DB_SECRET_NAME is NOT set).
# In production these are ignored — credentials come from Secrets Manager.
spring.datasource.url=jdbc:postgresql://localhost:5432/inventoryiq
spring.datasource.username=postgres
spring.datasource.password=postgres

# Actuator: expose /actuator/health for the ALB health check
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
